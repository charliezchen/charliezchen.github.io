---
layout: page
---
<div id="presentations">
  <section class="bg"></section>
  <h1 class="title">{{ page.title }}</h1>
  <ol class="presentations-list">
    {% for _ in site.data.courses %}
      {% assign course = _.course %}
      <li>
        <em class="title">{{ course.title }}</em> <em class="date">{{ course.date }}</em>
        {% if course.description %}
        <div>
            {{ course.description}}
        </div>
        {% endif %}
      </li>
    {% endfor %}
  </ol>
</div>
